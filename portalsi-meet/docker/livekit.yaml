port: 7880
bind_addresses:
  - "0.0.0.0"



rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50200
  use_external_ip: false

  stun_servers:
    - "stun.l.google.com:19302"
    - "stun1.l.google.com:19302"

turn:
  enabled: false

logging:
  level: info
  json: false

room:
  enabled_codecs:
    - mime: audio/opus
    - mime: video/vp9
    - mime: video/vp8
    - mime: video/h264
    - mime: video/av1
  max_participants: 100
  empty_timeout: 300
  departure_timeout: 20
