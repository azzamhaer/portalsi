services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_LIVEKIT_URL: wss://livekit.portalsi.com:8443
    image: portalsi-meet-web:latest
    container_name: portalsi-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3005:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_HTTP_URL=http://livekit:7880
      - NEXT_PUBLIC_LIVEKIT_URL=wss://livekit.portalsi.com:8443
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    networks:
      - portalsi

  redis:
    image: redis:7-alpine
    container_name: portalsi-redis
    restart: unless-stopped
    command: ['redis-server', '--maxmemory', '256mb', '--maxmemory-policy', 'allkeys-lru']
    volumes:
      - redis-data:/data
    networks:
      - portalsi
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    container_name: portalsi-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml --node-ip=194.233.85.152
    volumes:
      - ./docker/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "127.0.0.1:7880:7880"
      - "7881:7881"
      - "50000-50200:50000-50200/udp"
    environment:
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    networks:
      - portalsi

  coturn:
    image: coturn/coturn:4.6-alpine
    container_name: portalsi-coturn
    restart: unless-stopped
    network_mode: host
    command: >
      -n --log-file=stdout --listening-port=3478 --tls-listening-port=5349 --min-port=49160 --max-port=49200
      --realm=${TURN_REALM} --external-ip=194.233.85.152 --user=${TURN_USER}:${TURN_PASSWORD}
      --lt-cred-mech --fingerprint --no-multicast-peers --no-cli --no-tlsv1 --no-tlsv1_1

  caddy:
    image: caddy:alpine
    container_name: portalsi-caddy
    restart: unless-stopped
    ports:
      - "8443:8443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - /etc/letsencrypt/live/livekit.portalsi.com:/etc/certs:ro
      - /etc/letsencrypt/archive:/etc/letsencrypt/archive:ro
    depends_on:
      - livekit
    networks:
      - portalsi

networks:
  portalsi:
    driver: bridge
volumes:
  redis-data:
